server {
  listen 8080;
  server_name _;
  location = /healthz { access_log off; return 200 "ok\n"; }
  location = /index.html { root /usr/share/nginx/html; etag off; if_modified_since off; expires -1; try_files /index.html =404; }
  location / { root /usr/share/nginx/html; try_files $uri $uri/ /index.html; }
}
server {
  listen 8443 ssl http2;
  server_name _;
  ssl_certificate /run/secrets/web-tls.crt;
  ssl_certificate_key /run/secrets/web-tls.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_tickets off;
  client_max_body_size 64k;
  add_header Strict-Transport-Security "max-age=31536000" always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy no-referrer always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'sha256-/IiHTQllMEt1knsqzjwvVGxsMxXaQ7ZdISgkRO6D6NI='; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
  location /api/ { proxy_pass http://controller:8787; proxy_set_header Host $host; proxy_set_header Forwarded "for=$remote_addr;proto=https;host=$host"; proxy_set_header X-Forwarded-For $remote_addr; proxy_set_header X-Forwarded-Proto https; proxy_set_header X-Forwarded-Host $host; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; proxy_buffering off; }
  location = /healthz { proxy_pass http://controller:8787/healthz; }
  location = /readyz { proxy_pass http://controller:8787/readyz; }
  location = /index.html { root /usr/share/nginx/html; etag off; if_modified_since off; expires -1; try_files /index.html =404; }
  location / { root /usr/share/nginx/html; try_files $uri $uri/ /index.html; }
}
map $http_upgrade $connection_upgrade { default upgrade; '' close; }
